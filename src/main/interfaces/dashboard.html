<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Negocio POS - Dashboard</title>

    <link href="../../../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../../node_modules/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../styles/global.css">
</head>

<body class="fondo_principal d-flex vh-100 overflow-hidden">

    <aside class="menu_lateral bg-white border-end d-flex flex-column justify-content-between shadow-sm">

        <div>
            <div class="cabecera_logo d-flex align-items-center p-4 mb-2">
                <div class="icono_logo rounded text-success d-flex justify-content-center align-items-center me-3">
                    <i class="bi bi-shop fs-5"></i>
                </div>
                <span class="fw-bold fs-5 text-dark tracking-tight">Mi Negocio POS</span>
            </div>

            <nav class="navegacion_principal px-3">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a href="#" class="nav-link activo d-flex align-items-center text-secondary"
                            data-vista="ventas.html">
                            <i class="bi bi-cart3 me-3 fs-5"></i> Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center text-secondary"
                            data-vista="productos.html">
                            <i class="bi bi-box-seam me-3 fs-5"></i> Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center text-secondary"
                            data-vista="categorias.html">
                            <i class="bi bi-tags me-3 fs-5"></i> Categorías
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center text-secondary" data-vista="compras.html">
                            <i class="bi bi-truck me-3 fs-5"></i> Compras
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center text-secondary"
                            data-vista="reportes.html">
                            <i class="bi bi-bar-chart me-3 fs-5"></i> Reportes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link text-secondary" data-vista="usuarios.html">
                            <i class="bi bi-people me-2"></i> Usuarios
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link d-flex align-items-center text-secondary" data-vista="ajustes.html">
                            <i class="bi bi-gear me-3 fs-5"></i> Ajustes
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="pie_menu">
            <div class="perfil_usuario d-flex align-items-center p-3 mx-3 mb-2 border-top">
                <div
                    class="avatar_usuario bg-light rounded-circle d-flex justify-content-center align-items-center me-3 text-secondary">
                    <i class="bi bi-person fs-5"></i>
                </div>
                <div class="info_usuario d-flex flex-column">
                    <span class="fw-bold text-dark lh-1 mb-1" style="font-size: 0.95rem;"
                        id="nombreUsuarioSidebar">Admin User</span>
                    <small class="text-muted lh-1" style="font-size: 0.8rem;"
                        id="rolUsuarioSidebar">Administrador</small>
                </div>
            </div>
            <div class="px-3 pb-4">
                <a href="#" id="btnCerrarSesion"
                    class="nav-link boton_salir d-flex align-items-center text-danger fw-medium px-3 py-2 rounded">
                    <i class="bi bi-box-arrow-right me-3 fs-5"></i> Cerrar Sesión
                </a>
            </div>
        </div>

    </aside>

    <main class="contenido_principal flex-grow-1 p-4 overflow-auto" id="contenedor_dinamico">
        <div class="d-flex h-100 justify-content-center align-items-center text-muted flex-column">
            <i class="bi bi-layout-sidebar display-1 mb-3 opacity-25"></i>
            <h5>Área Dinámica</h5>
            <p>Selecciona una opción del menú.</p>
        </div>
    </main>

    <div class="modal fade" id="modalConfirmacionGenerico" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg text-center"
                style="border-radius: var(--radio-borde-tarjeta); padding: 2rem;">

                <div class="modal-body p-0 mb-4">
                    <div class="mx-auto mb-4 d-flex align-items-center justify-content-center"
                        style="width: 75px; height: 75px; background-color: #fee2e2; border-radius: 50%;">
                        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 2.5rem;"></i>
                    </div>
                    <h4 class="fw-bold text-dark mb-3" id="tituloModalConfirmacion">¿Estás seguro?</h4>
                    <p class="text-muted mb-0 px-4" id="mensajeModalConfirmacion" style="font-size: 1rem;">
                        Esta acción no se puede deshacer.
                    </p>
                </div>

                <div class="d-flex gap-3 justify-content-center mt-2 px-3">
                    <button type="button" class="btn btn-light px-4 py-2 border flex-grow-1 fw-medium"
                        style="border-radius: var(--radio-borde-elementos);" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger px-4 py-2 flex-grow-1 fw-medium"
                        style="border-radius: var(--radio-borde-elementos);" id="btnConfirmarAccionModal">Sí,
                        eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000;">
        <div id="toastNotificacion" class="toast align-items-center text-white bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium" id="toastMensaje">
                    Acción realizada con éxito.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto shadow-none" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="../../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/admin.js"></script>

</body>

</html>
