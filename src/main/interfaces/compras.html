<div class="tarjeta_seccion h-100 p-4 p-md-5 d-flex flex-column overflow-hidden border-0 shadow-sm"
    style="background-color: #ffffff; border-radius: var(--radio-borde-tarjeta);">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h4 class="fw-bold text-dark mb-0">Gestión de Compras</h4>

        <div class="d-flex gap-3 align-items-center">
            <button id="btnNuevoProveedor"
                class="btn btn_outline_primario px-3 fw-medium d-flex align-items-center text-nowrap">
                <i class="bi bi-plus-lg me-2"></i> Nuevo Proveedor
            </button>
            <button id="btnNuevaCompra" class="btn boton_primario px-3 fw-medium d-flex align-items-center text-nowrap">
                <i class="bi bi-plus-lg me-2"></i> Nueva Compra
            </button>
        </div>
    </div>

    <div class="row g-3 mb-4 align-items-end">
        <div class="col-12 col-md-4">
            <label class="form-label text-muted fw-bold mb-1" style="font-size: 0.70rem; letter-spacing: 0.5px;">BUSCAR
                COMPRA</label>
            <div class="input-group input_ajustes">
                <span class="input-group-text bg-transparent border-end-0 text-muted ps-3">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="inputBuscarCompra" class="form-control border-start-0 shadow-none ps-0"
                    placeholder="Buscar por ID, o proveedor...">
            </div>
        </div>
        <div class="col-12 col-md-3">
            <label class="form-label text-muted fw-bold mb-1"
                style="font-size: 0.70rem; letter-spacing: 0.5px;">ESTADO</label>
            <select id="selectFiltroEstadoCompra" class="form-select select_ajustes shadow-none text-muted">
                <option value="Todos" selected>Todos</option>
                <option value="pagado">Pagado</option>
                <option value="pendiente">Pendiente</option>
            </select>
        </div>
        <div class="col-12 col-md-3">
            <label class="form-label text-muted fw-bold mb-1"
                style="font-size: 0.70rem; letter-spacing: 0.5px;">PROVEEDOR</label>
            <select id="selectFiltroProveedorCompra" class="form-select select_ajustes shadow-none text-muted">
                <option value="Todos" selected>Todos</option>
            </select>
        </div>
        <div class="col-12 col-md-2">
            <label class="form-label text-muted fw-bold mb-1"
                style="font-size: 0.70rem; letter-spacing: 0.5px;">FECHA</label>
            <input type="date" id="inputFiltroFechaCompra" class="form-control input_ajustes shadow-none text-muted">
        </div>
    </div>

    <div class="contenedor_tabla_compras table-responsive flex-grow-1 border-0 mt-2">
        <table class="table tabla_compras align-middle mb-0">
            <thead>
                <tr>
                    <th class="ps-4">ID COMPRA</th>
                    <th>PROVEEDOR / FECHA</th>
                    <th>ESTADO</th>
                    <th>CUBIERTO</th>
                    <th>A CRÉDITO</th>
                    <th>TOTAL</th>
                    <th class="text-center">LLEGADA</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tbodyListaCompras">

            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalNuevoProveedor" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="fw-bold text-dark mb-0">Registrar Nuevo Proveedor</h5>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body px-4 py-4">
                <form id="formProveedorData">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold mb-1">Nombre de la Compañia: *</label>
                            <input type="text" class="form-control input_ajustes shadow-none py-2" id="inputCompania"
                                placeholder="Ej. Coca-Cola FEMSA" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold mb-1">Nombre del Encargado: </label>
                            <input type="text" class="form-control input_ajustes shadow-none py-2" id="inputEncargado"
                                placeholder="Ej. Juan Pérez">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold mb-1">Telefono: </label>
                            <input type="text" class="form-control input_ajustes shadow-none py-2"
                                id="inputTelefonoProv" placeholder="33 1234 5678">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold mb-1">Correo Electrónico: </label>
                            <input type="email" class="form-control input_ajustes shadow-none py-2" id="inputEmailProv"
                                placeholder="ventas@proveedor.com">
                        </div>

                        <div class="col-12 mt-2">
                            <label class="form-label text-muted small fw-bold mb-3">Dias de Entrega: </label>
                            <div class="d-flex flex-wrap gap-2">
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Lun"
                                        id="diaLun">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaLun">Lunes</label>
                                </div>
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Mar"
                                        id="diaMar">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaMar">Martes</label>
                                </div>
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Mie"
                                        id="diaMie">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaMie">Miércoles</label>
                                </div>
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Jue"
                                        id="diaJue">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaJue">Jueves</label>
                                </div>
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Vie"
                                        id="diaVie">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaVie">Viernes</label>
                                </div>
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Sab"
                                        id="diaSab">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaSab">Sábado</label>
                                </div>
                                <div
                                    class="form-check dia_checkbox_wrapper border rounded px-3 py-2 cursor-pointer transition-all">
                                    <input class="form-check-input check_dia d-none" type="checkbox" value="Dom"
                                        id="diaDom">
                                    <label class="form-check-label small fw-medium cursor-pointer m-0"
                                        for="diaDom">Domingo</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer border-0 px-4 pb-4 pt-0 justify-content-end gap-2">
                <button type="button" class="btn btn-light px-4 border fw-medium"
                    data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="formProveedorData" class="btn boton_primario px-4 fw-medium">Registrar
                    Proveedor</button>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="modalNuevaCompra" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="fw-bold text-dark mb-0">Registrar Nueva Compra</h5>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body px-4 py-4">
                <form id="formCompraData">

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold mb-1">PROVEEDOR *</label>
                            <select class="form-select select_ajustes shadow-none py-2" id="selectProveedorCompra"
                                required>
                                <option value="" selected disabled>Selecciona un proveedor...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold mb-1">FECHA DE COMPRA</label>
                            <input type="date" class="form-control input_ajustes shadow-none py-2"
                                id="inputFechaCompra">
                        </div>
                    </div>

                    <div class="border rounded" style="background-color: var(--color-fondo-input);">
                        <div class="table-responsive lista_ticket_scroll" style="max-height: 215px; overflow-y: auto;">
                            <table class="table table-borderless align-middle mb-0" id="tablaProductosCompra">
                                <thead
                                    style="position: sticky; top: 0; z-index: 10; background-color: var(--color-fondo-tarjeta);">
                                    <tr class="border-bottom">
                                        <th class="text-muted small fw-bold py-3 ps-3" style="width: 45%;">PRODUCTO</th>
                                        <th class="text-muted small fw-bold py-3" style="width: 20%;">COSTO UNIT.</th>
                                        <th class="text-muted small fw-bold py-3" style="width: 15%;">CANTIDAD</th>
                                        <th class="text-muted small fw-bold py-3" style="width: 15%;">SUBTOTAL</th>
                                        <th class="py-3 text-center" style="width: 5%;"></th>
                                    </tr>
                                </thead>
                                <tbody id="tbodyProductosCompra">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="button" id="btnAgregarFilaCompra"
                            class="btn btn_outline_primario btn-sm px-3 fw-medium rounded-pill">
                            <i class="bi bi-plus-lg me-1"></i> Agregar producto
                        </button>
                    </div>

                    <hr class="my-4 border-light">

                    <div class="d-flex justify-content-end">
                        <div class="text-end" style="min-width: 250px;">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="text-muted fw-medium">Subtotal:</span>
                                <span class="text-dark fw-bold" id="txtSubtotalCompra">$0.00</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
                                <span class="text-dark fw-bold fs-5">TOTAL COMPRA:</span>
                                <span class="text-primario fw-bold fs-4" id="txtTotalCompra"
                                    style="color: var(--color-primario);">$0.00</span>
                            </div>
                        </div>
                    </div>

                </form>
            </div>

            <div class="modal-footer border-0 px-4 pb-4 pt-0 justify-content-end gap-2">
                <button type="button" class="btn btn-light px-4 border fw-medium"
                    data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="formCompraData" class="btn boton_primario px-4 fw-medium">Confirmar
                    Compra</button>
            </div>

        </div>
    </div>
</div>
