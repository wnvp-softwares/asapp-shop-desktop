<div class="row h-100 g-4">

    <div class="col-12 col-xl-8 d-flex flex-column h-100">
        <div class="tarjeta_seccion flex-grow-1 p-4 d-flex flex-column">

            <div class="barra_busqueda_ventas input-group mb-4">
                <span class="input-group-text bg-transparent border-0 text-muted ps-3">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" class="form-control border-0 shadow-none" id="inputBuscarPOS"
                    placeholder="Buscar por nombre o código de barras...">
            </div>

            <div class="categorias_scroll d-flex gap-2 mb-4 overflow-auto pb-2" id="contenedorCategoriasPOS">
            </div>

            <div id="contenedorProductosPOS"
                class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3 flex-grow-1 align-content-start overflow-auto pe-2">



            </div>
        </div>
    </div>

    <div class="col-12 col-xl-4 d-flex flex-column h-100">
        <div class="tarjeta_seccion h-100 p-4 d-flex flex-column">

            <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
                <i class="bi bi-cart3 fs-4 me-2 text-dark"></i>
                <h5 class="fw-bold mb-0 text-dark">Venta Actual</h5>
            </div>

            <div id="estadoVacioPOS"
                class="carrito_vacio flex-grow-1 d-flex flex-column justify-content-center align-items-center">
                <i class="bi bi-cart-x icono_carrito_vacio"></i>
                <p class="mb-0 mt-2 text-muted fw-medium">El carrito está vacío</p>
            </div>

            <div id="contenedorTicketPOS"
                class="flex-grow-1 overflow-auto d-none d-flex flex-column gap-2 mb-3 pe-2 lista_ticket_scroll">
            </div>

            <div class="resumen_venta mt-auto border-top pt-3">
                <div class="d-flex justify-content-between mb-2 text-secondary" style="font-size: 0.9rem;">
                    <span>Subtotal</span>
                    <span id="txtSubtotalPOS">$0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-3 text-secondary" style="font-size: 0.9rem;">
                    <span>Descuento</span>
                    <span id="txtDescuentoPOS">-$0.00</span>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="fw-bold text-dark fs-5">Total</span>
                    <span class="texto_total text-success" id="txtTotalPOS">$0.00</span>
                </div>

                <p class="text-muted small fw-bold tracking-wide mb-2" style="font-size: 0.75rem;">MÉTODO DE PAGO</p>
                <div class="d-flex gap-2 mb-3" id="contenedorMetodosPago">
                    <div class="boton_metodo_pago activa" data-metodo="efectivo">
                        <i class="bi bi-cash fs-5"></i>
                        <span>Efectivo</span>
                    </div>
                    <div class="boton_metodo_pago" data-metodo="tarjeta">
                        <i class="bi bi-credit-card fs-5"></i>
                        <span>Tarjeta</span>
                    </div>
                    <div class="boton_metodo_pago" data-metodo="transferencia">
                        <i class="bi bi-bank fs-5"></i>
                        <span>Transf.</span>
                    </div>
                </div>

                <div id="contenedorPagoCon" class="d-flex align-items-center justify-content-between mb-4">
                    <span class="text-secondary fw-medium" style="font-size: 0.9rem;">Pago con:</span>
                    <div class="input-group ms-3" style="width: 140px;">
                        <span class="input-group-text bg-white border-end-0 text-muted px-2 border-light shadow-sm"><i
                                class="bi bi-currency-dollar"></i></span>
                        <input type="number" step="0.01"
                            class="form-control border-start-0 ps-0 shadow-sm border-light text-end fw-bold text-dark"
                            id="inputPagoCon" placeholder="0.00">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn boton_cancelar w-50 py-2 fw-medium rounded-3"
                        id="btnCancelarPOS">Cancelar</button>
                    <button class="btn boton_primario w-50 py-2 fw-medium rounded-3" id="btnCobrarPOS">Cobrar</button>
                </div>
            </div>

        </div>
    </div>
</div>
