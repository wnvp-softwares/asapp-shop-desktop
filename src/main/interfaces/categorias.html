<div class="tarjeta_seccion h-100 p-4 p-md-5 d-flex flex-column overflow-hidden">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h4 class="fw-bold text-dark mb-0">Categorías</h4>

        <div class="d-flex gap-3 align-items-center">
            <div class="barra_busqueda_ventas input-group" style="width: 250px;">
                <span class="input-group-text bg-transparent border-0 text-muted ps-3">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" id="inputBuscarCategoria" class="form-control border-0 shadow-none"
                    placeholder="Buscar categoría...">
            </div>

            <button id="btnNuevaCategoria"
                class="btn boton_primario px-3 px-md-4 fw-medium d-flex align-items-center text-nowrap">
                <i class="bi bi-plus-lg me-2"></i> Nueva Categoría
            </button>
        </div>
    </div>

    <div id="mensajeSinResultadosCategoria" class="d-none text-center mb-3 mt-3">
        <p class="text-muted mb-0" style="font-size: 0.95rem;">No se encontraron categorías.</p>
    </div>

    <div id="contenedorCategorias"
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4 overflow-auto pb-3 pe-2">
    </div>

    <div class="modal fade" id="modalFormularioCategoria" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: var(--radio-borde-tarjeta);">

                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold text-dark" id="tituloModalCategoria">Nueva Categoría</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body px-4 py-4">
                    <form id="formCategoriaData">
                        <input type="hidden" id="inputIdCategoria">

                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label text-muted small fw-medium mb-1">Nombre</label>
                                <input type="text" class="campo_entrada form-control" id="inputNombreCat">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-muted small fw-medium mb-1">Descripción</label>
                                <textarea class="campo_entrada form-control" id="inputDescripcionCat" rows="3"
                                    style="resize: none;"></textarea>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-0 px-4 pb-4 pt-0 justify-content-start">
                    <button type="button" class="btn btn-light px-4 border"
                        style="border-radius: var(--radio-borde-elementos);" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="formCategoriaData" class="btn boton_primario px-4"
                        id="btnGuardarCategoriaModal">Guardar Categoría</button>
                </div>
            </div>
        </div>
    </div>

</div>
