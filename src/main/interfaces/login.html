<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta - Iniciar Sesión</title>
    <link href="../../../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../../node_modules/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body class="fondo_principal">
    <div class="contenedor_centrado d-flex align-items-center justify-content-center min-vh-100">
        <div class="tarjeta_login card shadow border-0 p-4 p-md-5">
            <div class="cabecera_login text-center mb-4">
                <div class="contenedor_icono mx-auto mb-3">
                    <i class="bi bi-shop icono_tienda"></i>
                </div>
                <h1 class="titulo_login h4 fw-bold mb-2">Punto de Venta</h1>
                <p class="subtitulo_login mb-0">Ingresa a tu cuenta para continuar</p>
            </div>
            <form class="formulario_login" id="formLogin">

                <div id="alertaError" class="alert alert-danger d-none py-2 text-center"
                    style="font-size: 0.85rem; font-weight: 500;" role="alert">
                    Usuario o contraseña incorrectos.
                </div>

                <div class="mb-3">
                    <label for="usuario" class="etiqueta_formulario form-label fw-medium">Usuario</label>
                    <input type="text" class="campo_entrada form-control" id="usuario" placeholder="Ej. admin" >
                </div>
                <div class="mb-4">
                    <label for="contrasena" class="etiqueta_formulario form-label fw-medium">Contraseña</label>
                    <input type="password" class="campo_entrada form-control" id="contrasena" placeholder="••••••••"
                        >
                </div>
                <button type="submit" id="btnSubmit" class="boton_primario btn w-100 fw-medium">Iniciar Sesión</button>
            </form>
        </div>
    </div>
    <script src="../../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/admin.js"></script>
</body>

</html>
