<div class="tarjeta_seccion h-100 d-flex flex-column flex-xl-row overflow-hidden p-0 border-0 shadow-sm">

    <div class="d-flex flex-column h-100 border-end"
        style="background-color: #f8fafc; border-color: #e2e8f0 !important; width: 100%; flex: 0 0 400px; padding: 2rem;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-dark mb-0">Usuarios</h4>
            <button id="btnNuevoUsuario" class="btn boton_primario btn-sm px-3 fw-medium d-flex align-items-center">
                <i class="bi bi-plus-lg me-2"></i> Nuevo usuario
            </button>
        </div>

        <div class="barra_busqueda_ventas input-group mb-4 bg-white shadow-sm border-0">
            <span class="input-group-text bg-transparent border-0 text-muted ps-3">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" id="inputBuscarUsuario" class="form-control border-0 shadow-none py-2 bg-transparent"
                placeholder="Buscar usuario...">
        </div>

        <div id="mensajeSinResultados" class="d-none text-center mb-3">
            <p class="text-muted mb-0" style="font-size: 0.95rem;">No se encontraron usuarios.</p>
        </div>

        <div class="lista_usuarios_scroll flex-grow-1 overflow-auto pe-2">
        </div>

    </div>

    <div class="flex-grow-1 h-100 bg-white d-flex flex-column" style="padding: 3rem; overflow-y: auto;">

        <div id="estadoVacioUsuario" class="text-center m-auto contenedor_vacio_usuario">
            <div class="bg-light rounded-circle mx-auto mb-4 d-flex align-items-center justify-content-center shadow-sm"
                style="width: 100px; height: 100px;">
                <i class="bi bi-person text-secondary opacity-25" style="font-size: 4rem;"></i>
            </div>
            <h5 class="fw-bold text-dark">Selecciona un usuario</h5>
            <p class="text-muted">Selecciona un elemento de la lista para ver sus detalles o editar su información.</p>
        </div>

        <div id="detalleUsuario" class="d-none flex-column h-100">

            <div class="d-flex justify-content-between align-items-start mb-5 pb-4 border-bottom border-light">
                <div class="d-flex align-items-center">
                    <div class="avatar_grande me-4" id="detAvatar">--</div>
                    <div>
                        <h2 class="fw-bold text-dark mb-1" id="detNombre">Cargando...</h2>
                        <div class="text-muted d-flex align-items-center">
                            <i class="bi bi-shield-check me-2"></i> <span id="detRol">Rol</span>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button id="btnEditarUsuario" class="btn btn_editar_usuario px-3 fw-medium text-nowrap">
                        <i class="bi bi-pencil me-2"></i> Editar
                    </button>
                    <button id="btnEliminarUsuario" class="btn btn_eliminar_usuario px-3 fw-medium text-nowrap">
                        <i class="bi bi-trash3 me-2"></i> Eliminar
                    </button>
                </div>
            </div>

            <h6 class="fw-bold text-dark mb-4">Información de la cuenta</h6>
            <div class="row g-4">

                <div class="col-md-6">
                    <label class="form-label text-muted small mb-2">Usuario de acceso</label>
                    <div class="campo_lectura">
                        <i class="bi bi-person text-secondary"></i>
                        <span id="detUsuarioAcceso">--</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label text-muted small mb-2">Último acceso</label>
                    <div class="campo_lectura">
                        <i class="bi bi-clock text-secondary"></i>
                        <span id="detUltimoAcceso">--</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label text-muted small mb-2">Teléfono</label>
                    <div class="campo_lectura">
                        <i class="bi bi-telephone text-secondary"></i>
                        <span id="detTelefono">--</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div class="modal fade" id="modalFormularioUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: var(--radio-borde-tarjeta);">

                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold text-dark" id="tituloModalUsuario">Nuevo Usuario</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body px-4 py-4">
                    <form id="formUsuarioData">
                        <input type="hidden" id="inputIdUsuario">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-medium mb-1">Nombre Completo</label>
                                <input type="text" class="campo_entrada form-control" id="inputNombreUsr" >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-medium mb-1">Usuario de Acceso</label>
                                <input type="text" class="campo_entrada form-control" id="inputUsuarioAcceso" >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-medium mb-1">Rol</label>
                                <select class="select_ajustes form-select campo_entrada" id="inputRolUsr" >
                                    <option value="" disabled selected>Cargando roles...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-medium mb-1">Teléfono</label>
                                <input type="text" class="campo_entrada form-control" id="inputTelefonoUsr">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-muted small fw-medium mb-1">Contraseña <span id="hintPass"
                                        class="fw-normal" style="color:#a1a1aa; font-size: 0.8rem;"></span></label>
                                <input type="password" class="campo_entrada form-control" id="inputPassUsr">
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-0 px-4 pb-4 pt-0 justify-content-start">
                    <button type="button" class="btn btn-light px-4 border"
                        style="border-radius: var(--radio-borde-elementos);" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="formUsuarioData" class="btn boton_primario px-4"
                        id="btnGuardarUsuarioModal">Guardar Usuario</button>
                </div>
            </div>
        </div>
    </div>

</div>
